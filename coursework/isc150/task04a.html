<!DOCTYPE html>
<html>
	<head>
		<title>Accumulation from M</title>
		<link type="text/css" rel="stylesheet" href="/~walonzo/style/stylesheet.css"/>
		<script>
			/**
			* Function: adds numbers until reaches M or more
			* Returns: last number used in summing to 100
			*/
			function MOrMoreFrom1(m) {
				var accumulator = 0;
				var i = 1;
				while (accumulator < parseInt(m)) {
					accumulator += i;
					document.the_form.total.value = accumulator;
					i++;
					}
				return i-1;
			}
			/* When the user clicks on the button, 
			toggle between hiding and showing the dropdown content */
			function myFunction() {
				document.getElementById("myDropdown").classList.toggle("show");
			}
			function myFunction1() {
				document.getElementById("myDropdown1").classList.toggle("show");
			}
			function myFunction2() {
				document.getElementById("myDropdown2").classList.toggle("show");
			}
			// Close the dropdown menu if the user clicks outside of it
			window.onclick = function(event) {
				if (!event.target.matches('.dropbtn')) {

			var dropdowns = document.getElementsByClassName("dropdown-content");
			var i;
			for (i = 0; i < dropdowns.length; i++) {
				var openDropdown = dropdowns[i];
				if (openDropdown.classList.contains('show')) {
					openDropdown.classList.remove('show');
						}
					}
				}
			}
		</script>
	</head>
	<body>
		<div class="navbar">
			<li> <div class="dropdown">
					<button onclick="myFunction()" class="dropbtn"><a href="/~walonzo/">Home</a></button>
					<div id="myDropdown" class="dropdown-content">
						<a href="/~walonzo">Home</a>
						<a href="/~walonzo/coursework/index.html">Coursework</a>
						<a href="/~walonzo/hello.html">Hello World!</a>
						<a href="/~walonzo/interactive_story/index.html">Creative Work</a>
						<a href="/~walonzo/testing/test.html">Testing</a>
						<a href="/~walonzo/interactive_story/info.html">Name</a>
					</div>
				</div>
			<li><div class="dropdown">
					<button onclick="myFunction1()" class="dropbtn"><a href="/~walonzo/coursework">Coursework</a></button>
					<div id="myDropdown1" class="dropdown-content">
						<a href="/~walonzo/coursework/index.html">Coursework</a>
						<a href="/~walonzo/coursework/isc150/index.html">ISC 150</a>
						<a href="/~walonzo/coursework/isc110/index.html">ISC 110</a>
					</div>
				</div>
			</li>
			<li> <div class="dropdown">
					<button onclick="myFunction2()" class="dropbtn"><a href="/~walonzo/interactive_story/">Creative Work</a></button>
					<div id="myDropdown2" class="dropdown-content">
						<a href="/~walonzo/interactive_story/index.html">Creative Work</a>
					</div>
				</div>
			</li>
		</div>
		<hr>
	<p>
	</p><h2>How many natural numbers does it take to total M or more?</h2>
	<p></p>
		<div style="border:2px dashed green;background:#f5f5dc;">
			<form name="the_form">
				M:
					<input type="text" id="m" name="m" value="1" size="20"/>
	<br> 
				Accumulated sum:
					<input type="text" id="total" name="total" value="0" readonly="" size="20"/>
	<br>
				Last number used:
					<input type="text" id="last" name="last" readonly="" size="10"/>
	<br>
				<input type="button" value="Tell me" onclick="this.form.last.value = MOrMoreFrom1(this.form.m.value);">
				<input type="reset" value="Reset Form">
			</form>
		</div>
</body>
</html>
